# Configuración Global - Weather Trading MVP

app:
  env: development
  timezone: UTC
  log_level: INFO

polymarket:
  gamma_api_url: "https://gamma-api.polymarket.com"
  data_api_url: "https://data-api.polymarket.com"
  clob_api_url: "https://clob-api.polymarket.com"
  verifying_contract: "0x4bFb9e68f09497932d4375167AF1d4393049b161"
  chain_id: 137
  # wallet_address: "0x..."
  # private_key: "ENV_VAR_OR_OTHER_SECRET_METHOD"

weather_apis:
  aviation_weather_url: "https://aviationweather.gov/api/data/metar"
  open_meteo_url: "https://api.open-meteo.com/v1/forecast"
  open_meteo_previous_runs_url: "https://previous-runs-api.open-meteo.com/v1/forecast"
  weather_company_url: "https://api.weather.com"
  retry_attempts: 3
  retry_backoff_factor: 2.0

market_discovery:
  temperature_tag_id: "103040"
  weather_tag_id: "84"
  temperature_discovery_tag_ids:
    - "103040"
    - "84"
  gamma_page_size: 100
  gamma_max_pages: 20

operating_universe:
  allowed_regions:
    - "Europe"
    - "North America"
    - "South America"

risk_limits:
  min_edge_to_trade: 0.05
  max_slippage_allowed: 0.02
  min_slippage: 0.0025
  fee_buffer: 0.02
  safety_margin_base: 0.05
  max_spread_width: 0.10
  relative_spread_low_price_threshold: 0.10
  relative_spread_score_threshold: 0.35
  relative_spread_score_weight: 0.15
  min_quality_score: 0.55
  slippage_spread_multiplier: 0.25

operational_evidence:
  min_event_score: 0.62
  min_parser_confidence: 0.85
  min_calibration_days_for_calibrated: 3
  max_forecast_std_dev_c: 3.0
  max_late_intraday_remaining_hours_without_observed_max: 6

watchlist_risk:
  opposed_signal_veto_enabled: true
  min_opposed_trader_count_for_veto: 1

experimental_filters:
  celsius_range_bin_active_unclassified_veto_enabled: true

operator_risk:
  warn_if_log_loss_delta_exceeds: 0.25
  default_max_stake_usd: 999999.0
  horizon0_intraday_policy: "cap"
  horizon0_intraday_stake_multiplier: 0.20
  horizon0_intraday_max_stake_usd: 1.0
  horizon0_intraday_block_if_remaining_hours_exceeds: 6
  horizon0_block_without_local_observed_max_when_late: true
  horizon0_late_remaining_hours_threshold: 6
  fahrenheit_range_bin_stake_multiplier: 0.55
  fahrenheit_range_bin_max_stake_usd: 5.0
  fahrenheit_other_stake_multiplier: 0.75
  extreme_fair_probability_threshold: 0.85
  extreme_probability_stake_multiplier: 0.65
  tail_price_threshold: 0.03
  tail_price_stake_multiplier: 0.75

audit_quality:
  min_mature_coverage_for_complete: 0.95
  min_mature_coverage_for_actionable: 0.85

operational_readiness:
  block_if_live_snapshot_missing: true
  block_if_audit_non_conclusive: true
  warn_if_audit_partial: true
  block_if_weather_db_unavailable: true
  block_if_weather_db_empty: true
  warn_if_observation_lag_days_exceeds: 3
